# ==============================================
# AFK Dummy Plugin Configuration
# ==============================================

settings:
  # Cost in items per hour of dummy rental
  cost-per-hour: 5

  # Payment item type (Bukkit Material name)
  # Examples: DIAMOND, EMERALD, GOLD_INGOT, IRON_INGOT
  # You may also use MINECRAFT: prefix, e.g. MINECRAFT:DIAMOND
  payment-item: "DIAMOND"

  # Maximum number of dummies a single player can have active
  max-dummies-per-player: 1

  # Maximum total dummies allowed server-wide
  max-server-wide-dummies: 20

  # How often (in seconds) the plugin checks for expired dummies
  cleanup-interval-seconds: 30

  # Delay in ticks before respawning dummies after server restart
  # 40 ticks = 2 seconds, ensures worlds are fully loaded
  respawn-delay-ticks: 40
